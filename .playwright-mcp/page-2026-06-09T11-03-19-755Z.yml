  - generic [ref=e7]: arm-linux-gcc — digital-photo-frame
  - generic [ref=e8]:
    - text: /* Linux Framebuffer 数码相册 — 零图形库，全底层手写 */
    - text: // 1. Framebuffer 初始化 — mmap 显存映射
    - text: int fb_fd = open("/dev/fb0", O_RDWR);
    - text: int* fb_ptr = (int*)mmap(NULL, 800*480*4, PROT_READ|PROT_WRITE, MAP_SHARED, fb_fd, 0);
    - text: // 2. BMP 手动解析 — packed struct 读文件头
    - text: "typedef struct __attribute__((packed)) {"
    - text: uint16_t type; // "BM"
    - text: uint32_t size;
    - text: uint32_t offbits; // 像素数据偏移 = 54
    - text: uint32_t width, height;
    - text: uint16_t bitcount; // 24bpp
    - text: "} BmpHeader;"
    - text: // 3. 17 种动画切换 — 百叶窗 / 圆形收缩 / 对角线滑动
    - text: "// 模式 7-8: 圆形动画 — 距离公式逐像素比较"
    - text: "for (int k = 0; k < 400; k += 4) {"
    - text: for (int y = 0; y < 480; y++)
    - text: for (int x = 0; x < 800; x++)
    - text: if ((x-400)*(x-400) + (y-240)*(y-240) < k*k)
    - text: fb_ptr[y*800+x] = bmp_pixel[y][x];
    - text: "}"
    - text: // 4. 触摸手势 — /dev/input/event0 原始事件
    - text: struct input_event ev;
    - text: read(ts_fd, &ev, sizeof(ev));
    - text: if (ev.type == EV_ABS && ev.code == ABS_X) touch_x = ev.value;
    - text: if (ev.type == EV_KEY && ev.code == BTN_TOUCH && ev.value == 0)
    - text: detectSwipe(slide_x1, slide_y1, touch_x, touch_y);
    - text: // 5. mplayer FIFO 音乐控制
    - text: mkfifo("/tmp/fifo", 0666);
    - text: system("mplayer -slave -quiet -input file=/tmp/fifo &");
    - text: write(fifo_fd, "pause\n", 6);
    - text: write(fifo_fd, "volume 50 1\n", 13);