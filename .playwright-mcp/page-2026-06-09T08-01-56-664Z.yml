    - text: // 寄存器级裸机编程 — 无 HAL，无标准外设库
    - text: // 使能 GPIOB 时钟
    - text: RCC->APB2ENR |= RCC_APB2ENR_IOPBEN;
    - text: // 配置 PB0 为 50MHz 推挽输出
    - text: GPIOB->CRL &= ~(0xF << 0);
    - text: GPIOB->CRL |= (0x3 << 0);
    - text: // 原子置位 PB0 — 点亮绿色 LED
    - text: GPIOB->BSRR = GPIO_BSRR_BS0;
